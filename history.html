<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="py-12 px-6">

<div id="app" class="max-w-2xl mx-auto">
    <header class="mb-12 pb-4">
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Activity Log</h1>
        <p id="last-update" class="text-sm font-medium text-blue-400"></p>
    </header>

    <div id="log-container" class="space-y-4">
        </div>

    <nav class="mt-12 flex justify-between items-center bg-white p-4 rounded-2xl border border-blue-50 shadow-sm">
        <button id="prev-btn" class="px-4 py-2 text-sm font-bold text-blue-600 hover:bg-blue-50 rounded-xl disabled:text-slate-300 disabled:hover:bg-transparent transition-all cursor-pointer">
            ← Prev
        </button>
        <span id="page-info" class="text-sm font-bold text-slate-400 tracking-widest"></span>
        <button id="next-btn" class="px-4 py-2 text-sm font-bold text-blue-600 hover:bg-blue-50 rounded-xl disabled:text-slate-300 disabled:hover:bg-transparent transition-all cursor-pointer">
            Next →
        </button>
    </nav>
</div>

<script src="script.js"></script>
</body>
</html>
